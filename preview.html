<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motionless in Black</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(0, 0, 0, 0.8), rgba(20, 0, 0, 0.9)),
        url("https://images.unsplash.com/photo-1506157786151-b8491531f063?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
      color: white;
      overflow: hidden;
    }

    .overlay {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      backdrop-filter: blur(2px);
    }

    h1 {
      font-size: 72px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #ff0000;
      text-shadow:
        0 0 10px #ff0000,
        0 0 20px #ff0000,
        0 0 40px #990000;
      margin-bottom: 20px;
    }

    p {
      font-size: 22px;
      color: #d1d1d1;
      margin-bottom: 50px;
    }

    nav {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    nav a {
      text-decoration: none;
      color: white;
      border: 2px solid #ff0000;
      padding: 16px 32px;
      font-size: 18px;
      text-transform: uppercase;
      background: rgba(0, 0, 0, 0.65);
      transition: 0.3s ease;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
    }

    nav a:hover {
      background: #ff0000;
      color: black;
      transform: scale(1.05);
      box-shadow:
        0 0 15px #ff0000,
        0 0 30px #ff0000;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 42px;
      }

      p {
        font-size: 16px;
        padding: 0 20px;
      }

      nav {
        flex-direction: column;
        gap: 20px;
      }

      nav a {
        width: 260px;
      }
    }
  </style>
</head>

<body>

  <div class="overlay">
    <h1>Motionless in Black</h1>

    <p>
      Dark metalcore from the void
    </p>

    <nav>
      <a href="Comcert.html">Концерты</a>

      <a href="WhoGroup.html">О группе</a>

      <a href="translation.html">Трансляция концертов</a>
    </nav>
  </div>

</body>
</html>
